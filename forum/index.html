<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Forum — CodeFX</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/forum.css">
</head>
<body>
  <header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
    <div class="container flex items-center justify-between" style="height:100%">
      <a href="/" style="font-weight:700;font-size:1.25rem">CodeFX Forum</a>
      <nav class="flex gap-md"><a href="/">Home</a><a href="/forum">Forum</a></nav>
    </div>
  </header>
  <main class="container section">
    <div class="flex items-center justify-between" style="margin-bottom:2rem">
      <h1 style="font-size:1.5rem;font-weight:700">Forum</h1>
      <button class="btn btn-primary" onclick="showNewPost()">New Post</button>
    </div>
    <div id="forum-categories"></div>
    <div id="forum-posts"></div>
  </main>
  <div id="new-post-modal" class="codefx-modal-overlay" style="display:none">
    <div class="codefx-modal" style="max-width:600px">
      <button class="codefx-modal-close" onclick="document.getElementById('new-post-modal').style.display='none'">&times;</button>
      <h2 style="margin-bottom:1rem">New Post</h2>
      <form id="new-post-form" style="display:grid;gap:1rem">
        <select id="post-category" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
          <option value="">Select category</option>
          <option value="tech">Tech</option>
          <option value="plant">Plant</option>
          <option value="photography">Photography</option>
        </select>
        <input id="post-title" type="text" placeholder="Post title" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <textarea id="post-content" placeholder="Write your post..." rows="6" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical"></textarea>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Publish</button>
      </form>
    </div>
  </div>
  <script src="/assets/js/core.js"></script>
  <script src="/assets/js/forum.js"></script>
</body>
</html>
