<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Status — CodeFX Admin</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
<script src="/assets/js/admin-auth.js"></script>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>CodeFX</h2>
      <nav>
        <a href="/admin/index.html">Dashboard</a>
        <a href="/admin/database">Database</a>
        <a href="/admin/plugins/index.html">Plugins</a>
        <a href="/admin/tools/index.html">Tools</a>
        <a href="/admin/files/index.html">Files</a>
        <a href="/admin/status/index.html" class="active">Status</a>
        <a href="/">View Site</a>
      </nav>
    </aside>
    <main class="admin-content">
      <div class="admin-header">
        <h1>Server Status</h1>
        <p>Real-time system monitoring and statistics</p>
      </div>
      <div id="status-grid" class="status-grid">
        <div class="status-card"><div class="label">Status</div><div class="value" id="s-status">Checking...</div></div>
        <div class="status-card"><div class="label">Uptime</div><div class="value" id="s-uptime">-</div></div>
        <div class="status-card"><div class="label">Node.js</div><div class="value" id="s-node">-</div></div>
        <div class="status-card"><div class="label">Platform</div><div class="value" id="s-platform">-</div></div>
      </div>
      <h3 style="font-weight:600;margin:1.5rem 0 0.75rem">CPU</h3>
      <div class="cpu-bar" id="cpu-bar"><div class="cpu-fill" id="cpu-fill" style="width:0%"></div></div>
      <p style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.25rem" id="cpu-text">0% used</p>
      <h3 style="font-weight:600;margin:1.5rem 0 0.75rem">Memory</h3>
      <div class="mem-bar" id="mem-bar"><div class="mem-fill" id="mem-fill" style="width:0%"></div></div>
      <p style="font-size:0.8rem;color:var(--color-text-muted);margin-top:0.25rem" id="mem-text">0% used</p>
      <h3 style="font-weight:600;margin:1.5rem 0 0.75rem">Site Statistics</h3>
      <div class="stats-grid" id="content-stats">
        <div class="stat-card"><div class="stat-value" id="stat-users">0</div><div class="stat-label">Users</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-posts">0</div><div class="stat-label">Blog Posts</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-forum">0</div><div class="stat-label">Forum Posts</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-tickets">0</div><div class="stat-label">Tickets</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-messages">0</div><div class="stat-label">Messages</div></div>
        <div class="stat-card"><div class="stat-value" id="stat-visits">0</div><div class="stat-label">Visits</div></div>
      </div>
    </main>
  </div>
  <script src="/assets/js/core.js"></script>
  <script src="/assets/js/dashboard.js"></script>
</body>
</html>
