<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CodeFX CMS</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/cms.css">
  <style>
    .admin-layout { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .admin-sidebar { background: var(--color-surface); border-right: 1px solid var(--color-border); padding: 1.5rem; }
    .admin-sidebar nav { display: grid; gap: 0.5rem; }
    .admin-sidebar a { padding: 0.5rem 0.75rem; border-radius: var(--radius-md); }
    .admin-sidebar a:hover { background: var(--color-border); }
    .admin-sidebar a.active { background: var(--color-primary); color: white; }
    .admin-content { padding: 2rem; }
    .admin-header { margin-bottom: 2rem; }
    .section-list { display: grid; gap: 0.75rem; }
    .section-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); cursor: grab; }
    .section-item:hover { box-shadow: var(--shadow-sm); }
    .section-item.dragging { opacity: 0.5; }
    .section-item.drag-over { border-color: var(--color-primary); }
    .add-btn { border: 2px dashed var(--color-border); padding: 1rem; text-align: center; border-radius: var(--radius-md); cursor: pointer; color: var(--color-text-muted); }
    .add-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2 style="font-weight:700;margin-bottom:1.5rem">CodeFX CMS</h2>
      <nav>
        <a href="/admin" class="active">Sections</a>
        <a href="/">View Site</a>
      </nav>
    </aside>
    <main class="admin-content">
      <div class="admin-header">
        <h1 style="font-size:1.5rem;font-weight:700">Manage Sections</h1>
        <p class="text-muted">Drag to reorder. Double-click to edit content.</p>
      </div>
      <div class="section-list" id="section-list">
        <div class="section-item" draggable="true" data-section="about"><span>About</span><span class="text-muted">&#9776;</span></div>
        <div class="section-item" draggable="true" data-section="skills"><span>Skills</span><span class="text-muted">&#9776;</span></div>
        <div class="section-item" draggable="true" data-section="projects"><span>Projects</span><span class="text-muted">&#9776;</span></div>
        <div class="section-item" draggable="true" data-section="contact"><span>Contact</span><span class="text-muted">&#9776;</span></div>
      </div>
      <div class="add-btn" onclick="addSection()">+ Add New Section</div>
    </main>
  </div>
  <script src="/assets/js/core.js"></script>
  <script>
    let draggedItem = null
    document.querySelectorAll('.section-item').forEach(function(item) {
      item.addEventListener('dragstart', function() { draggedItem = this; this.classList.add('dragging') })
      item.addEventListener('dragend', function() { this.classList.remove('dragging'); draggedItem = null })
      item.addEventListener('dragover', function(e) {
        e.preventDefault()
        document.querySelectorAll('.section-item').forEach(function(i) { i.classList.remove('drag-over') })
        this.classList.add('drag-over')
      })
      item.addEventListener('dragleave', function() { this.classList.remove('drag-over') })
      item.addEventListener('drop', function(e) {
        e.preventDefault()
        this.classList.remove('drag-over')
        if (draggedItem && draggedItem !== this) {
          var parent = this.parentNode
          var items = Array.from(parent.children)
          var fromIdx = items.indexOf(draggedItem)
          var toIdx = items.indexOf(this)
          if (fromIdx < toIdx) { this.after(draggedItem) } else { this.before(draggedItem) }
          saveOrder()
        }
      })
    })
    function addSection() {
      var name = prompt('Section name:')
      if (!name) return
      var list = document.getElementById('section-list')
      var div = document.createElement('div')
      div.className = 'section-item'
      div.draggable = true
      div.dataset.section = name.toLowerCase().replace(/\s+/g, '-')
      div.innerHTML = '<span>' + name + '</span><span class="text-muted">&#9776;</span>'
      list.appendChild(div)
    }
    function saveOrder() {
      var items = Array.from(document.querySelectorAll('.section-item'))
      var order = items.map(function(i) { return i.dataset.section })
      localStorage.setItem('codefx_section_order', JSON.stringify(order))
    }
  </script>
</body>
</html>
