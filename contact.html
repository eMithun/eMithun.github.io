<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .contact-container {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: var(--page-bg);
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .contact-title {
            color: #b30a2f;
            text-align: center;
            margin-bottom: 30px;
            font-size: 24px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: var(--text-color);
            font-size: 14px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            padding: 12px;
            border: 1px solid rgba(179, 10, 47, 0.2);
            border-radius: 8px;
            background: #b30a2f40;
            color: var(--text-color);
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #b30a2f;
            box-shadow: 0 0 0 2px rgba(179, 10, 47, 0.1);
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            background: #b30a2f;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-start;
        }

        .submit-btn:hover {
            background: #8f0824;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(179, 10, 47, 0.2);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .success-message {
            display: none;
            color: #28a745;
            text-align: center;
            padding: 15px;
            background: rgba(40, 167, 69, 0.1);
            border-radius: 8px;
            margin-top: 20px;
        }

        .error-message {
            display: none;
            color: #dc3545;
            text-align: center;
            padding: 15px;
            background: rgba(220, 53, 69, 0.1);
            border-radius: 8px;
            margin-top: 20px;
        }

        @media screen and (max-width: 768px) {            
            .contact-container {
                margin: 20px;
                padding: 15px;
            }
            .contact-container {
                max-width: 100%;
                margin: 20px;
                padding: 15px;
            }

            .contact-title {
                font-size: 20px;
                margin-bottom: 20px;
            }

            .form-group input,
            .form-group textarea {
                padding: 10px;
                font-size: 14px;
            }

            .submit-btn {
                width: 100%;
                padding: 10px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Background Animation -->
    <div class="floating-elements">
        <div class="floating-element"></div>
        <div class="floating-element"></div>
        <div class="floating-element"></div>
    </div>
        <!-- Floating Menu -->
        <div class="floating-menu">
            <a href="index.html" class="social-icon"><i class="fa fa-home"></i></a>
            <a href="about.html" class="social-icon"><i class="fa fa-info-circle"></i></a>
            <a href="contact.html" class="social-icon"><i class="fa fa-address-book"></i></a>
            <a href="portfolio.html" class="social-icon"><i class="fa fa-file"></i></a>
            <hr>
            <div class="social-links">
                <a href="#" class="social-icon"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-whatsapp"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
    <div class="contact-container">
        <h1 class="contact-title">Get in Touch</h1>
        <form id="contactForm" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-btn" >Send Message</button>
        </form>
        <div id="successMessage" class="success-message">
            Thank you for your message! I'll get back to you soon.

        </div>
        <div id="errorMessage" class="error-message">
            Something went wrong. Please try again later.
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            // Replace with your Google Apps Script URL
            const scriptURL = 'https://script.google.com/macros/s/AKfycbySlEtG1gllpIeToUrOj5jNdjBJZ7npVd_zmBIfDssaCj3IHLBYOvDD08WCkKXreB_2QQ/exec';

            fetch(scriptURL, {
                method: 'POST',
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('errorMessage').style.display = 'none';
                    document.getElementById('contactForm').reset();
                } else {
                    throw new Error('Network response was not ok');
                }
            })
            .catch(error => {
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                console.error('Error:', error);
            });
        });
    </script>
    <!-- Theme Toggle Button -->
    <button class="theme-toggle" onclick="toggleTheme()">
        <i class="fas fa-moon"></i>
    </button>

    <script src="script.js"></script>

</div>
</body>
</html>
