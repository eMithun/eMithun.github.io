<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Support Tickets — CodeFX</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <style>
    .ticket { padding: 1rem; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: 0.75rem; }
    .ticket h3 { font-weight: 600; }
    .ticket .meta { font-size: 0.75rem; color: var(--color-text-muted); }
    .status-open { color: var(--color-success); font-weight: 500; }
    .status-closed { color: var(--color-error); font-weight: 500; }
  </style>
</head>
<body>
  <header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
    <div class="container flex items-center justify-between" style="height:100%">
      <a href="/" style="font-weight:700;font-size:1.25rem">Support</a>
      <nav class="flex gap-md"><a href="/">Home</a><a href="/ticket">Tickets</a></nav>
    </div>
  </header>
  <main class="container section" style="max-width:48rem">
    <div class="flex items-center justify-between" style="margin-bottom:2rem">
      <h1 style="font-size:1.5rem;font-weight:700">Support Tickets</h1>
      <button class="btn btn-primary" onclick="showNewTicket()">New Ticket</button>
    </div>
    <div id="ticket-list"></div>
  </main>
  <div id="new-ticket-modal" class="codefx-modal-overlay" style="display:none">
    <div class="codefx-modal" style="max-width:500px">
      <button class="codefx-modal-close" onclick="document.getElementById('new-ticket-modal').style.display='none'">&times;</button>
      <h2 style="margin-bottom:1rem">New Ticket</h2>
      <form id="new-ticket-form" style="display:grid;gap:1rem">
        <input id="ticket-subject" type="text" placeholder="Subject" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <textarea id="ticket-message" placeholder="Describe your issue..." rows="5" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical"></textarea>
        <button type="submit" class="btn btn-primary" style="justify-content:center">Submit</button>
      </form>
    </div>
  </div>
  <script>
    var tickets = JSON.parse(localStorage.getItem('codefx_tickets') || '[]')
    function renderTickets() {
      var container = document.getElementById('ticket-list')
      if (!tickets.length) { container.innerHTML = '<p class="text-muted" style="text-align:center;padding:2rem">No tickets yet.</p>'; return }
      container.innerHTML = tickets.sort(function(a,b) { return b.timestamp - a.timestamp }).map(function(t) {
        return '<div class="ticket"><div class="flex items-center justify-between" style="margin-bottom:0.25rem"><h3>' + esc(t.subject) + '</h3><span class="status-' + t.status + '">' + t.status + '</span></div><p class="meta">#' + t.id + ' \u00b7 ' + timeAgo(t.timestamp) + '</p></div>'
      }).join('')
    }
    document.addEventListener('submit', function(e) {
      var form = e.target.closest('#new-ticket-form')
      if (!form) return; e.preventDefault()
      var auth = JSON.parse(localStorage.getItem('codefx_session') || 'null')
      if (!auth) { alert('Sign in first'); return }
      tickets.push({ id: Date.now().toString(36).toUpperCase(), subject: document.getElementById('ticket-subject').value, message: document.getElementById('ticket-message').value, status: 'open', timestamp: Date.now(), user: auth.email })
      localStorage.setItem('codefx_tickets', JSON.stringify(tickets))
      document.getElementById('new-ticket-modal').style.display = 'none'
      form.reset(); renderTickets()
    })
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML }
    function timeAgo(ts) { var s = Math.floor((Date.now() - ts) / 1000); if (s < 60) return 'just now'; var m = Math.floor(s / 60); if (m < 60) return m + 'm ago'; var h = Math.floor(m / 60); if (h < 24) return h + 'h ago'; var d = Math.floor(h / 24); return d + 'd ago' }
    window.showNewTicket = function() {
      var auth = JSON.parse(localStorage.getItem('codefx_session') || 'null')
      if (!auth) { alert('Sign in first'); return }
      document.getElementById('new-ticket-modal').style.display = 'flex'
    }
    document.addEventListener('DOMContentLoaded', renderTickets)
  </script>
</body>
</html>
