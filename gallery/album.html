<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Album — eMithun Gallery</title>
<link rel="stylesheet" href="/assets/css/reset.css"><link rel="stylesheet" href="/assets/css/variables.css"><link rel="stylesheet" href="/assets/css/utilities.css"><link rel="stylesheet" href="/assets/css/gallery.css"></head>
<body>
<header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
  <div class="container flex items-center justify-between" style="height:100%">
    <a href="/" style="font-weight:700;font-size:1.25rem">eMithun</a>
    <nav class="flex gap-md"><a href="/">Home</a><a href="/gallery">Gallery</a></nav>
  </div>
</header>
<main class="container section">
  <div id="album-header" style="margin-bottom:2rem">
    <a href="/gallery" style="font-size:0.875rem;color:var(--color-text-muted)">&larr; Back to Gallery</a>
    <h1 id="album-title" style="font-size:1.5rem;font-weight:700;margin-top:0.5rem"></h1>
    <p id="album-desc" class="text-muted"></p>
  </div>
  <div class="flex gap-sm" style="margin-bottom:1rem">
    <button class="btn btn-primary" onclick="showAddPhoto()">Add Photo</button>
  </div>
  <div id="album-images" class="gallery-grid"></div>
</main>
<div id="add-photo-modal" class="codefx-modal-overlay" style="display:none">
  <div class="codefx-modal" style="max-width:500px">
    <button class="codefx-modal-close" onclick="document.getElementById('add-photo-modal').style.display='none'">&times;</button>
    <h2 style="margin-bottom:1rem">Add Photo</h2>
    <form id="add-photo-form" style="display:grid;gap:1rem">
      <input id="photo-url" type="url" placeholder="Image URL" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
      <input id="photo-title" type="text" placeholder="Photo title" style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
      <textarea id="photo-desc" placeholder="Description (optional)" rows="2" style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical"></textarea>
      <button type="submit" class="btn btn-primary" style="justify-content:center">Add</button>
    </form>
  </div>
</div>
<div id="lightbox" class="codefx-modal-overlay" style="display:none;background:rgba(0,0,0,0.9)">
  <button class="codefx-modal-close" onclick="closeLightbox()" style="color:white;font-size:2rem">&times;</button>
  <div style="display:flex;align-items:center;justify-content:center;height:100%;padding:2rem">
    <img id="lightbox-img" src="" alt="" style="max-width:90%;max-height:90%;border-radius:var(--radius-md);object-fit:contain">
  </div>
  <div style="position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);color:white;text-align:center">
    <p id="lightbox-title" style="font-weight:600"></p>
    <p id="lightbox-desc" class="text-muted" style="color:#ccc"></p>
  </div>
</div>
<script src="/assets/js/core.js"></script><script src="/assets/js/gallery.js"></script>
</body>
</html>
