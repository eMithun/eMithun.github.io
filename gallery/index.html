<!DOCTYPE html>
<html lang="en" data-theme="light">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Gallery — Mithun Hasan</title>
<link rel="stylesheet" href="/assets/css/reset.css"><link rel="stylesheet" href="/assets/css/variables.css"><link rel="stylesheet" href="/assets/css/utilities.css"><link rel="stylesheet" href="/assets/css/gallery.css"></head>
<body>
<header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
  <div class="container flex items-center justify-between" style="height:100%">
    <a href="/" style="font-weight:700;font-size:1.25rem">Mithun Hasan</a>
    <nav class="flex gap-md"><a href="/">Home</a><a href="/gallery">Gallery</a></nav>
  </div>
</header>
<main class="container section">
  <div class="flex items-center justify-between" style="margin-bottom:2rem">
    <h1 style="font-size:1.5rem;font-weight:700">Gallery</h1>
    <button class="btn btn-primary" onclick="showNewAlbum()">New Album</button>
  </div>
  <div id="gallery-albums" class="gallery-grid"></div>
</main>
<div id="new-album-modal" class="codefx-modal-overlay" style="display:none">
  <div class="codefx-modal" style="max-width:500px">
    <button class="codefx-modal-close" onclick="document.getElementById('new-album-modal').style.display='none'">&times;</button>
    <h2 style="margin-bottom:1rem">New Album</h2>
    <form id="new-album-form" style="display:grid;gap:1rem">
      <input id="album-title" type="text" placeholder="Album title" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
      <select id="album-category" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <option value="">Select category</option>
        <option value="Portrait">Portrait</option>
        <option value="Landscape">Landscape</option>
        <option value="Macro">Macro</option>
        <option value="Street">Street</option>
        <option value="Wildlife">Wildlife</option>
      </select>
      <textarea id="album-desc" placeholder="Description (optional)" rows="3" style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical"></textarea>
      <button type="submit" class="btn btn-primary" style="justify-content:center">Create</button>
    </form>
  </div>
</div>
<script src="/assets/js/core.js"></script><script src="/assets/js/gallery.js"></script>
</body>
</html>
