<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Blog Admin — CodeFX</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/blog.css">
</head>
<body>
  <header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
    <div class="container flex items-center justify-between" style="height:100%">
      <a href="/" style="font-weight:700;font-size:1.25rem">Blog Admin</a>
      <nav class="flex gap-md"><a href="/">Home</a><a href="/blog">Blog</a><a href="/blog/admin.html" class="active">Admin</a></nav>
    </div>
  </header>
  <main class="container section" style="max-width:48rem">
    <div class="flex items-center justify-between" style="margin-bottom:2rem">
      <h1 style="font-size:1.5rem;font-weight:700">Manage Posts</h1>
      <button class="btn btn-primary" onclick="showNewPost()">New Post</button>
    </div>
    <div id="admin-post-list"></div>
  </main>
  <div id="edit-post-modal" class="codefx-modal-overlay" style="display:none">
    <div class="codefx-modal" style="max-width:700px">
      <button class="codefx-modal-close" onclick="document.getElementById('edit-post-modal').style.display='none';currentEditId=null">&times;</button>
      <h2 style="margin-bottom:1rem" id="edit-modal-title">Edit Post</h2>
      <form id="edit-post-form" style="display:grid;gap:1rem">
        <input id="edit-post-title" type="text" placeholder="Post title" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <select id="edit-post-category" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
          <option value="">Select category</option>
          <option value="general">General</option>
          <option value="tech">Tech</option>
          <option value="life">Life</option>
          <option value="photography">Photography</option>
          <option value="gardening">Gardening</option>
        </select>
        <input id="edit-post-tags" type="text" placeholder="Tags (comma separated)" style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <textarea id="edit-post-content" placeholder="Write in markdown..." rows="12" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical;font-family:monospace"></textarea>
        <div class="flex gap-sm"><button type="submit" class="btn btn-primary" style="flex:1;justify-content:center">Save</button><button type="button" class="btn btn-outline" onclick="if(confirm('Delete this post?')){deletePost(currentEditId)}">Delete</button></div>
      </form>
    </div>
  </div>
  <script src="/assets/js/core.js"></script>
  <script src="/assets/js/blog.js"></script>
  <script>document.addEventListener('DOMContentLoaded',renderAdminPosts)</script>
</body>
</html>
