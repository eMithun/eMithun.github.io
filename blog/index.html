<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Blog — Mithun Hasan</title>
  <link rel="stylesheet" href="/assets/css/reset.css">
  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/utilities.css">
  <link rel="stylesheet" href="/assets/css/blog.css">
  <link rel="alternate" type="application/rss+xml" title="Mithun Hasan Blog" href="/blog/rss.xml">
</head>
<body>
  <header style="height:var(--header-height);border-bottom:1px solid var(--color-border);background:var(--color-background);position:sticky;top:0;z-index:100">
    <div class="container flex items-center justify-between" style="height:100%">
      <a href="/" style="font-weight:700;font-size:1.25rem">Mithun Hasan</a>
      <nav class="flex gap-md"><a href="/">Home</a><a href="/blog">Blog</a></nav>
    </div>
  </header>
  <main class="container section" style="max-width:48rem">
    <div class="flex items-center justify-between" style="margin-bottom:2rem">
      <h1 style="font-size:1.5rem;font-weight:700">Blog</h1>
      <div class="flex gap-sm">
        <button class="btn btn-outline" onclick="document.getElementById('rss-link').click()" title="RSS Feed">RSS</button>
        <button class="btn btn-primary" onclick="showNewPost()">New Post</button>
      </div>
      <a id="rss-link" href="/blog/rss.xml" style="display:none"></a>
    </div>
    <div class="flex gap-sm" style="margin-bottom:1.5rem;flex-wrap:wrap">
      <select id="blog-filter-category" class="blog-filter" onchange="filterPosts()">
        <option value="all">All Categories</option>
        <option value="general">General</option>
          <option value="tech">Tech</option>
          <option value="life">Life</option>
          <option value="photography">Photography</option>
          <option value="gardening">Gardening</option>
      </select>
      <input id="blog-filter-search" type="search" placeholder="Search posts..." class="blog-filter" style="flex:1;min-width:200px" oninput="filterPosts()">
    </div>
    <div id="blog-posts"></div>
  </main>
  <div id="new-post-modal" class="codefx-modal-overlay" style="display:none">
    <div class="codefx-modal" style="max-width:700px">
      <button class="codefx-modal-close" onclick="document.getElementById('new-post-modal').style.display='none'">&times;</button>
      <h2 style="margin-bottom:1rem">New Blog Post</h2>
      <form id="new-post-form" style="display:grid;gap:1rem">
        <input id="post-title" type="text" placeholder="Post title" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <select id="post-category" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
          <option value="">Select category</option>
          <option value="general">General</option>
          <option value="tech">Tech</option>
          <option value="life">Life</option>
          <option value="photography">Photography</option>
          <option value="gardening">Gardening</option>
        </select>
        <input id="post-tags" type="text" placeholder="Tags (comma separated)" style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md)">
        <textarea id="post-content" placeholder="Write your post in markdown..." rows="12" required style="padding:0.75rem;border:1px solid var(--color-border);border-radius:var(--radius-md);resize:vertical;font-family:monospace"></textarea>
        <div class="flex gap-sm"><button type="submit" class="btn btn-primary" style="flex:1;justify-content:center">Publish</button></div>
      </form>
    </div>
  </div>
  <script src="/assets/js/core.js"></script>
  <script src="/assets/js/blog.js"></script>
</body>
</html>
